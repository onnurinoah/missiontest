<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선교 적성 검사 (Mission DNA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .circle-btn { transition: all 0.2s; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; margin: 0 auto; }
        .circle-btn:active { transform: scale(0.9); background-color: #e0e7ff; }
        .circle-lg { width: 60px; height: 60px; border: 2px solid #e2e8f0; }
        .circle-sm { width: 46px; height: 46px; border: 2px solid #e2e8f0; }
        .scenario-box { padding: 20px; border-radius: 1.25rem; background-color: #ffffff; border: 1px solid #e2e8f0; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .type-img-shadow { filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1)); }
        
        /* 16:9 비율 유지 */
        .ratio-16-9 {
            aspect-ratio: 16 / 9;
            max-height: 90vh;
            max-width: calc(90vh * 16 / 9);
            width: 100%;
            margin: 0 auto;
        }

        /* 구분선 스타일 */
        .choice-divider {
            height: 1px;
            width: 40%;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin: 8px auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <button onclick="toggleFullScreen()" class="fixed top-4 right-4 z-50 bg-white/80 backdrop-blur-sm p-3 rounded-2xl shadow-sm border border-gray-100 active:scale-90 transition-all hover:bg-white">
        <svg id="fs-icon" class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
        </svg>
    </button>

    <div id="start-screen" class="max-w-md w-full text-center fade-in">
        <div class="mb-6 text-6xl">🧬</div>
        <h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">선교 적성 검사</h1>
        <p class="text-gray-500 mb-8 leading-relaxed px-6 text-sm">나의 선교적 성향을 확인하고<br>나와 가장 잘 맞는 동역자를 찾아보세요.</p>
        <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 hover:bg-indigo-700 transition-all">검사 시작하기</button>
    </div>

    <div id="question-screen" class="max-w-md w-full hidden">
        <div class="mb-6 px-2">
            <div class="flex justify-between text-[11px] text-gray-400 mb-2 font-bold uppercase tracking-widest">
                <span id="progress-text">1 / 20</span>
                <span class="text-indigo-500 font-black">Missionary Test</span>
            </div>
            <div class="w-full bg-gray-200 h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-300" style="width: 5%"></div>
            </div>
        </div>

        <div id="question-container" class="bg-white rounded-[2.5rem] p-7 shadow-sm border border-gray-100 fade-in">
            <div class="text-center mb-6">
                <span class="inline-block bg-indigo-50 text-indigo-600 text-[12px] font-bold px-4 py-1.5 rounded-full mb-3 italic">만약에...</span>
                <h2 id="scenario-text" class="text-xl font-extrabold text-gray-900 leading-snug"></h2>
            </div>
            <div class="flex flex-col gap-4">
                <div class="scenario-box border-l-4 border-l-indigo-400"><p id="option-a-text" class="text-center text-gray-800 font-bold text-[15px]"></p></div>
                
                <div class="flex flex-col gap-3 py-2">
                    <button onclick="handleAnswer(2, 'left')" class="flex flex-col items-center gap-1"><div class="circle-btn circle-lg"></div><span class="text-[10px] text-gray-400 font-bold">매우 그렇다</span></button>
                    <button onclick="handleAnswer(1, 'left')" class="flex flex-col items-center gap-1"><div class="circle-btn circle-sm"></div><span class="text-[10px] text-gray-400 font-bold">약간 그렇다</span></button>
                    
                    <div class="choice-divider"></div>

                    <button onclick="handleAnswer(1, 'right')" class="flex flex-col items-center gap-1"><div class="circle-btn circle-sm"></div><span class="text-[10px] text-gray-400 font-bold">약간 그렇다</span></button>
                    <button onclick="handleAnswer(2, 'right')" class="flex flex-col items-center gap-1"><div class="circle-btn circle-lg"></div><span class="text-[10px] text-gray-400 font-bold">매우 그렇다</span></button>
                </div>

                <div class="scenario-box border-l-4 border-l-gray-300"><p id="option-b-text" class="text-center text-gray-800 font-bold text-[15px]"></p></div>
            </div>
            <div class="flex justify-start mt-8 pt-4 border-t border-gray-50">
                <button id="prev-btn" onclick="goBack()" class="text-gray-400 hover:text-indigo-600 flex items-center gap-1 text-xs font-bold uppercase tracking-tighter">PREV</button>
            </div>
        </div>
    </div>

    <div id="loading-screen" class="max-w-md w-full hidden text-center fade-in">
        <div class="mb-8 text-7xl animate-bounce">✨</div>
        <h2 class="text-2xl font-black text-gray-900 mb-2">분석 완료!</h2>
        <button onclick="showResult()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-xl shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all">결과 확인하기</button>
    </div>

    <div id="result-screen" class="max-w-md w-full hidden fade-in py-6">
        <div class="bg-white rounded-[3rem] p-8 shadow-2xl border border-indigo-50 text-center relative">
            <h3 class="text-indigo-500 font-bold mb-6 uppercase tracking-[0.3em] text-[10px]">Your Mission DNA</h3>
            <div class="flex justify-center mb-6"><img id="result-img" src="" alt="Type Image" class="w-48 h-auto type-img-shadow"></div>
            
            <div id="result-code" class="text-5xl font-black text-indigo-900 mb-2 italic tracking-tighter">TYPE</div>
            <div id="result-keywords" class="flex justify-center gap-1.5 mb-6 overflow-x-hidden whitespace-nowrap"></div>

            <h2 id="result-title" class="text-2xl font-bold text-gray-800 mb-2 px-4"></h2>
            <p id="result-summary" class="text-indigo-600 font-bold text-[14px] mb-8 px-4 break-keep"></p>
            
            <div class="text-left bg-gray-50 p-6 rounded-[2rem] border border-white shadow-inner mb-8">
                <p id="result-desc" class="text-[14px] text-gray-600 leading-[1.7] whitespace-pre-wrap break-keep"></p>
            </div>

            <div id="pc-buttons-section" class="hidden md:flex flex-col gap-3 mb-6 border-t border-gray-100 pt-6">
                <div class="text-[11px] font-bold text-gray-400 uppercase tracking-widest text-left pl-2 mb-1">Slide View (16:9)</div>
                <button onclick="toggleIndicators()" class="w-full bg-white text-gray-700 py-4 rounded-2xl font-bold hover:bg-gray-50 transition-all border border-gray-200 shadow-sm text-base">
                    📊 8가지 지표 크게 보기
                </button>
                <button onclick="toggleSummary16()" class="w-full bg-white text-gray-700 py-4 rounded-2xl font-bold hover:bg-gray-50 transition-all border border-gray-200 shadow-sm text-base">
                    🗂️ 16가지 유형 요약 보기
                </button>
                <button onclick="toggleAllTypes()" class="w-full bg-indigo-50 text-indigo-700 py-4 rounded-2xl font-bold hover:bg-indigo-100 transition-all border border-indigo-100 shadow-sm text-base mt-2">
                    📖 16가지 유형 상세 설명
                </button>
            </div>

            <button onclick="location.reload()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">다시 테스트하기</button>
        </div>
    </div>

    <div id="all-types-modal" class="fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="all-types-content">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-2xl font-black text-gray-900">16가지 전체 유형 상세</h2>
                <button onclick="toggleAllTypes()" class="text-gray-400 hover:text-gray-700 p-2"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5" id="all-types-grid"></div>
        </div>
    </div>

    <div id="indicators-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white ratio-16-9 rounded-[3rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="indicators-content">
            <div class="px-10 py-6 border-b flex justify-between items-center bg-gray-900 text-white flex-shrink-0">
                <h2 class="text-3xl font-black tracking-tighter">📊 8가지 선교 지표 요약</h2>
                <button onclick="toggleIndicators()" class="text-gray-400 hover:text-white p-2">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-grow p-10 bg-gray-50 flex flex-col justify-around h-full">
                <div class="grid grid-rows-4 gap-6 h-full" id="indicators-grid"></div>
            </div>
        </div>
    </div>

    <div id="summary-16-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white ratio-16-9 rounded-[3rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="summary-16-content">
            <div class="px-10 py-6 border-b flex justify-between items-center bg-indigo-900 text-white flex-shrink-0">
                <h2 class="text-3xl font-black tracking-tighter">🗂️ 16가지 선교 DNA</h2>
                <button onclick="toggleSummary16()" class="text-indigo-300 hover:text-white p-2">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-grow p-10 bg-indigo-50 flex items-center justify-center h-full">
                <div class="grid grid-cols-4 grid-rows-4 gap-6 w-full h-full" id="summary-16-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // 전체화면 토글
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.warn(`Error: ${err.message}`); });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // 모달 제어
        function toggleModal(modalId, contentId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
            } else {
                modal.classList.add('opacity-0'); content.classList.add('scale-95');
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }

        // 1. 상세형 렌더링
        function toggleAllTypes() {
            const grid = document.getElementById('all-types-grid');
            if (grid.innerHTML === "") {
                Object.entries(results).forEach(([code, data]) => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm";
                    card.innerHTML = `<div class="text-indigo-500 font-black text-sm mb-1 uppercase">${code}</div><div class="font-bold text-gray-900 text-lg mb-2">${data.title}</div><div class="text-gray-600 text-[13px] break-keep">${data.summary}</div>`;
                    grid.appendChild(card);
                });
            }
            toggleModal('all-types-modal', 'all-types-content');
        }

        // 2. 8가지 지표 렌더링 (확대형)
        function toggleIndicators() {
            const grid = document.getElementById('indicators-grid');
            if (grid.innerHTML === "") {
                const pairs = [[allIndicators[0], allIndicators[1]], [allIndicators[2], allIndicators[3]], [allIndicators[4], allIndicators[5]], [allIndicators[6], allIndicators[7]]];
                pairs.forEach(pair => {
                    const row = document.createElement('div');
                    row.className = "flex w-full gap-8 items-center h-full bg-white rounded-3xl shadow-md border border-gray-100 p-6";
                    row.innerHTML = `
                        <div class="flex-1 flex flex-col justify-center border-r-4 border-dashed border-gray-50 h-full">
                            <div class="flex items-center gap-4 mb-2">
                                <span class="text-6xl font-black text-indigo-600 italic">${pair[0].id}</span>
                                <span class="text-3xl font-black text-gray-900">${pair[0].label.split(' ')[1]}</span>
                            </div>
                            <p class="text-gray-500 text-xl font-bold break-keep">${pair[0].desc}</p>
                        </div>
                        <div class="flex-shrink-0"><span class="bg-gray-200 text-gray-500 font-black text-lg px-4 py-1 rounded-full italic">VS</span></div>
                        <div class="flex-1 flex flex-col justify-center h-full text-right">
                            <div class="flex items-center justify-end gap-4 mb-2">
                                <span class="text-3xl font-black text-gray-900">${pair[1].label.split(' ')[1]}</span>
                                <span class="text-6xl font-black text-gray-400 italic">${pair[1].id}</span>
                            </div>
                            <p class="text-gray-500 text-xl font-bold break-keep">${pair[1].desc}</p>
                        </div>`;
                    grid.appendChild(row);
                });
            }
            toggleModal('indicators-modal', 'indicators-content');
        }

        // 3. 16가지 요약 렌더링 (확대형)
        function toggleSummary16() {
            const grid = document.getElementById('summary-16-grid');
            if (grid.innerHTML === "") {
                Object.entries(results).forEach(([code, data]) => {
                    const box = document.createElement('div');
                    box.className = "bg-white rounded-[2rem] shadow-md border border-indigo-100 flex flex-col items-center justify-center text-center p-4 h-full hover:bg-indigo-600 group transition-all";
                    box.innerHTML = `
                        <div class="text-4xl font-black text-indigo-900 group-hover:text-white mb-2 italic tracking-tighter">${code}</div>
                        <div class="text-xl font-bold text-gray-800 group-hover:text-white leading-tight break-keep">${data.title}</div>`;
                    grid.appendChild(box);
                });
            }
            toggleModal('summary-16-modal', 'summary-16-content');
        }

        // ESC 키 닫기
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ['all-types-modal', 'indicators-modal', 'summary-16-modal'].forEach(id => {
                    if (!document.getElementById(id).classList.contains('hidden')) toggleModal(id, id.replace('-modal', '-content'));
                });
            }
        });

        // [데이터 로직 - 기존과 동일]
        const rawQuestions = [{q:"모임에 어색한 정적이 흐를 때,",a:"내가 먼저 아무 말이나 던져 침묵을 깬다.",b:"누군가 말할 때까지 속으로 기다린다.",left:'F',right:'B'},{q:"지인과 함께 식사를 하러갈 때,",a:"먼저 물컵과 수저를 세팅한다.",b:"조심히 상황을 지켜보며 기다린다.",left:'F',right:'B'},{q:"팀 프로젝트를 진행할 때,",a:"마이크를 잡고 스피치 하는 발표자",b:"타이밍 맞춰 PPT를 넘겨주는 오퍼레이터",left:'F',right:'B'},{q:"사역의 자리나 아웃리치에서,",a:"기획을 하는 것이 마음이 편하다.",b:"기획된 대로 움직이는 것이 편하다.",left:'F',right:'B'},{q:"전자기기나 유행에 대해서,",a:"늘 새로운 것을 시도하는 얼리어답터",b:"늘 익숙한 것을 추구하는 안정형",left:'F',right:'B'},{q:"식당에서 메뉴를 고를 때,",a:"안 먹어본 오늘의 특선! 낯선 맛에 도전한다.",b:"늘 먹던 실패 없는 그 맛! 단골 메뉴를 시킨다.",left:'W',right:'L'},{q:"서점에 가서 베스트셀러 코너를 볼 때,",a:"지구 반대편의 역사나 거시적인 세계 정세에 관한 책에 손이 간다.",b:"지금 내 삶에 바로 적용할 수 있는 실용서에 손이 간다.",left:'W',right:'L'},{q:"나에게 진짜 '쉼'이 필요할 때,",a:"비행기를 타고 한 번도 안 가본 곳으로 떠난다.",b:"가장 익숙한 내 방 침대에서 좋아하는 OTT를 본다.",left:'W',right:'L'},{q:"나에게 조금 더 와닿고 눈물이 나는 기도는,",a:"이름 모를 미전도 종족과 선교사님을 향한 기도",b:"나의 가족과 직장 동료, 내 옆자리 지체를 위한 기도",left:'W',right:'L'},{q:"나의 유튜브 알고리즘에는,",a:"해외여행 브이로그, 걸어서 세계속으로 등",b:"국내 핫플 리뷰, 일상 브이로그, 자기계발 등",left:'W',right:'L'},{q:"함께 일하던 팀원이 큰 실수를 했을 때,",a:"괜찮아? 많이 당황했지? 마음부터 챙긴다.",b:"어떻게 수습할지 플랜부터 짜자. 해결책부터 챙긴다.",left:'R',right:'T'},{q:"모임에 지각해서 문을 열고 들어갈 때,",a:"다들 정말 미안해! 많이 기다렸지?",b:"지금 모임 어디까지 진행됐어?",left:'R',right:'T'},{q:"함께 일할 파트너를 고를 때,",a:"성격이 원만하고 나랑 가치관이나 소통 방식이 잘 맞는 사람.",b:"일 처리 능력이 확실하고 내가 신경 안 써도 자기 몫을 다하는 사람.",left:'R',right:'T'},{q:"누군가에게 문제가 생겼을 때,",a:"조용히 옆에 앉아 끄덕이며 끝까지 이야기를 들어준다.",b:"그 사람의 문제를 실질적으로 해결할 방법을 찾아준다.",left:'R',right:'T'},{q:"누군가에게 줄 선물을 준비할 때,",a:"이 선물을 받고 감동할 지인의 표정과 추억을 떠올린다.",b:"지인에게 지금 가장 필요하고 실질적인 도움이 될 물건을 찾는다.",left:'R',right:'T'},{q:"공동체 수련회나 아웃리치 짐을 쌀 때,",a:"혹시 모르니까 며칠 전부터 완벽하게 다 세팅해 둔다.",b:"가서 사면 되지 출발 전날 눈에 보이는 대로 챙긴다.",left:'S',right:'A'},{q:"가기로 한 식당이 하필 오늘 휴무일일 때,",a:"왜 미리 검색을 안 했을까 스스로 극심한 스트레스를 받는다.",b:"오, 근처 다른 맛집을 찾을 기회네! 오히려 설렌다.",left:'S',right:'A'},{q:"어떤 목적지를 찾아 갈 때,",a:"도착 예정 시간과 최적의 경로를 철저히 따른다.",b:"가끔은 내비게이션을 끄고 발길 닿는 낯선 골목을 걸어본다.",left:'S',right:'A'},{q:"내 스마트폰 캘린더의 상태는,",a:"시간 단위로 할 일과 미팅이 빼곡하게 적혀 있다.",b:"굵직한 약속만 적혀 있고 비어있는 여백이         const allIndicators = [{id:'F',group:'사역의 위치',label:'F 전방현장형',desc:'현장 최전방에서 직접 소통하고 개척하는 스타일'},{id:'B',group:'사역의 위치',label:'B 후방지원형',desc:'보이지 않는 곳에서 행정과 기도로 든든히 받쳐주는 스타일'},{id:'W',group:'사역의 무대',label:'W 타문화열방형',desc:'낯선 문화권과 먼 나라 영혼들에 대한 뜨거운 마음'},{id:'L',group:'사역의 무대',label:'L 인근일상형',desc:'내 삶의 터전과 가까운 이웃을 돌보는 생활 밀착형'},{id:'R',group:'접근 방식',label:'R 관계중심형',desc:'사람의 마음과 감정, 나눔을 사역의 최우선으로 선호'},{id:'T',group:'접근 방식',label:'T 과업중심형',desc:'명확한 목표 달성과 효율적인 업무 처리를 중요시함'},{id:'S',group:'상황 대처',label:'S 계획중심형',desc:'철저한 준비와 체계적인 일정을 통해 안정적으로 사역'},{id:'A',group:'상황 대처',label:'A 유연대응형',desc:'변화하는 상황에 순발력 있게 대처하며 자유롭게 사역'}];

        const results = {"FWRS": {title:"준비된 글로벌 프론티어", summary:"선교지 최전방에서 현지인과 깊게 교제하며 철저히 계획된 개척자.", img:1, desc:"언어와 문화를 미리 꼼꼼히 공부해가서 현지인들에게 깊은 감동을 줍니다. 철저한 준비성이 당신의 강점입니다."}, "FWRA": {title:"성령충만 글로벌 인싸", summary:"낯선 타문화권에서도 바디랭귀지로 5분 만에 베프가 되는 자유로운 영혼.", img:2, desc:"계획에 없던 만남에서도 하나님이 예비하신 영혼을 기가 막히게 찾아냅니다. 당신의 미소는 강력한 열쇠입니다."}, "FWTS": {title:"열방의 홀리 버스커", summary:"등 뒤에 기타 하나 둘러메고 당당하게 앞장서는 달란트 부자.", img:3, desc:"사역 프로그램을 완벽하게 진행하여 흐트러짐 없는 복음을 전달합니다. 당신의 탁월한 준비성이 돋보입니다."}, "FWTA": {title:"위기탈출 타문화 특공대", summary:"돌발 상황이 생겨도 특유의 순발력으로 분위기를 띄우는 해결사.", img:4, desc:"예상치 못한 상황에서도 당황하지 않고, 오히려 즐거운 기회로 바꿔버립니다. 하나님은 당신의 끼를 사용하십니다."}, "FLRS": {title:"일상의 전략적 멘토", summary:"주변 영혼을 마음에 품고 치밀하게 전도하는 관계 전도의 달인.", img:5, desc:"친구의 필요를 세심하게 챙기며 감동을 줍니다. 당신의 삶을 나누며 이웃을 주님께 인도합니다."}, "FLRA": {title:"동네방네 빛과 소금", summary:"일상 속에서 누구와도 어울리며 그리스도의 향기를 뿜어내는 인싸.", img:6, desc:"꾸밈없는 일상이 주변 사람들에게 큰 울림을 줍니다. 당신을 보며 사람들은 교회에 대한 마음을 엽니다."}, "FLTS": {title:"공동체 하드캐리 리더", summary:"중요 사역을 철저하게 기획하고 맨 앞에서 끌고 가는 열정 리더.", img:7, desc:"모임의 목표를 꽉 잡고 추진력을 발휘합니다. 당신이 있으면 공동체는 든든하게 전진합니다."}, "FLTA": {title:"순발력 만렙 사역자", summary:"갑작스러운 사역 요청에도 당황하지 않고 해내는 만능 엔터테이너.", img:8, desc:"분위기를 유쾌하고 은혜롭게 주도합니다. 당신은 공동체의 비타민 같은 소중한 존재입니다."}, "BWRS": {title:"선교지 마더 테레사", summary:"눈에 띄지 않는 곳에서 현지인들의 아픔을 살피는 따뜻한 심장.", img:9, desc:"팀원들과 현지인들의 필요를 미리 파악하는 섬세함이 있습니다. 당신의 배려가 지친 영혼을 살립니다."}, "BWRA": {title:"국경 초월 힐러", summary:"말 없이 현지 아이들을 안아주고 상황에 맞춰 돌봐주는 힐러.", img:10, desc:"눈빛과 스킨십으로 상처 입은 마음을 어루만집니다. 당신의 조용한 섬김은 살아있는 설교입니다."}, "BWTS": {title:"파워 스케쥴 네비게이터", summary:"항공권부터 재정까지 선교의 뼈대를 오차 없이 세우는 브레인.", img:11, desc:"보이지 않는 수고 덕분에 팀원들이 사역에만 집중할 수 있습니다. 완벽한 행정이 당신의 은사입니다."}, "BWTA": {title:"선교지 만능 맥가이버", summary:"현장에서 발생하는 온갖 돌발적인 궂은일을 척척 해결하는 기둥.", img:12, desc:"남들이 꺼리는 일을 불평 없이 처리합니다. 하나님은 땀 흘리는 당신의 등을 아름답게 보십니다."}, "BLRS": {title:"비밀 중보기도 요원", summary:"지체들을 위해 매일 조용히 무릎 꿇는 가장 강력한 기도의 방패.", img:13, desc:"한번 들은 기도 제목은 절대 잊지 않습니다. 당신은 공동체를 영적으로 지탱하는 기둥입니다."}, "BLRA": {title:"공동체 인간 핫팩", summary:"소외된 새가족 곁에 다가가 조용히 마음을 녹여주는 따뜻한 난로.", img:14, desc:"당신 곁에 있으면 누구나 소속감을 느끼고 안정감을 얻습니다. 당신의 공감 능력이 영혼을 살립니다."}, "BLTS": {title:"디테일 깎는 장인", summary:"티 안 나는 사역을 완벽하게 준비하여 예배의 품격을 만드는 손.", img:15, desc:"PPT, 주보, 디자인 등 꼼꼼함이 필요한 곳에서 빛을 발합니다. 당신의 성실함이 큰 힘이 됩니다."}, "BLTA": {title:"교회의 숨은 천사", summary:"일손이 부족한 자리가 생기면 제일 먼저 달려가는 든든한 동역자.", img:16, desc:"누가 시키지 않아도 조용히 구멍을 메웁니다. 이름 없이 빛도 없이 섬기는 당신은 영웅입니다."}};

        let currentIndex = 0; let scores = {F:0,B:0,W:0,L:0,R:0,T:0,S:0,A:0}; let history = [];

        function startTest() { document.getElementById('start-screen').classList.add('hidden'); document.getElementById('question-screen').classList.remove('hidden'); showQuestion(); }
        function showQuestion() {
            const q = rawQuestions[currentIndex];
            document.getElementById('scenario-text').innerText = q.q;
            document.getElementById('option-a-text').innerText = q.a;
            document.getElementById('option-b-text').innerText = q.b;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / 20`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / 20) * 100}%`;
            document.getElementById('prev-btn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function handleAnswer(pts, side) {
            const q = rawQuestions[currentIndex]; const type = side === 'left' ? q.left : q.right;
            scores[type] += pts; history.push({ type, pts });
            if (currentIndex < 19) { currentIndex++; setTimeout(showQuestion, 150); }
            else { document.getElementById('question-screen').classList.add('hidden'); document.getElementById('loading-screen').classList.remove('hidden'); }
        }
        function goBack() { if (currentIndex > 0) { const last = history.pop(); scores[last.type] -= last.pts; currentIndex--; showQuestion(); } }
        function showResult() {
            const mbti = (scores.F >= scores.B ? "F" : "B") + (scores.W >= scores.L ? "W" : "L") + (scores.R >= scores.T ? "R" : "T") + (scores.S >= scores.A ? "S" : "A");
            const res = results[mbti];
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-img').src = `./${res.img}.PNG`;
            document.getElementById('result-code').innerText = mbti;
            document.getElementById('result-title').innerText = res.title;
            document.getElementById('result-summary').innerText = res.summary;
            document.getElementById('result-desc').innerText = res.desc;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
