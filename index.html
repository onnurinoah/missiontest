<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선교 적성 검사 (Mission MBTI)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            word-break: keep-all; 
            overflow-wrap: break-word;
            -webkit-tap-highlight-color: transparent;
        }
        .circle-btn { transition: all 0.2s; cursor: pointer; border: 2px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; }
        .circle-btn:active { transform: scale(0.9); background-color: #e0e7ff; }
        .circle-lg { width: 52px; height: 52px; }
        .circle-sm { width: 40px; height: 40px; }
        
        .question-fade { animation: qFade 0.4s ease-out; }
        @keyframes qFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="start-screen" class="max-w-md w-full text-center fade-in">
        <div class="mb-6 text-6xl">🧬</div>
        <h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">선교 적성 검사</h1>
        <p class="text-gray-500 mb-8 leading-relaxed px-6 text-sm">
            열방을 향한 나의 마음은 어떤 모습일까요?<br>
            <span class="text-indigo-600 font-bold">20개의 상황 질문</span>을 통해 유형을 확인해보세요.
        </p>
        <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 shadow-xl transition-all active:scale-95">검사 시작하기</button>
    </div>

    <div id="question-screen" class="max-w-md w-full hidden">
        <div class="mb-6 px-2">
            <div class="flex justify-between text-[10px] text-gray-400 mb-2 uppercase tracking-widest font-bold">
                <span id="progress-text">1 / 20</span>
                <span id="indicator-name" class="text-indigo-500 italic">Position</span>
            </div>
            <div class="w-full bg-gray-200 h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-indigo-500 h-full transition-all duration-300" style="width: 5%"></div>
            </div>
        </div>

        <div id="question-container" class="bg-white rounded-[2.5rem] p-7 shadow-sm border border-gray-100 flex flex-col question-fade">
            <div class="text-center mb-6">
                <span class="inline-block bg-indigo-50 text-indigo-600 text-[11px] font-bold px-3 py-1 rounded-full mb-3 uppercase tracking-tighter">Scenario</span>
                <h2 id="scenario-text" class="text-xl font-extrabold text-gray-900 leading-snug px-2 italic">상황 질문이 들어가는 자리입니다.</h2>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-50/50 rounded-2xl p-4 border border-gray-50">
                    <p id="option-a" class="text-center text-gray-700 font-semibold text-[15px] mb-4">선택지 A</p>
                    <div class="flex justify-center gap-6">
                        <button onclick="handleAnswer(2, 'left')" class="flex flex-col items-center gap-1 group">
                            <div class="circle-btn circle-lg border-2 border-indigo-200 shadow-sm"></div>
                            <span class="text-[10px] text-gray-400 font-bold group-active:text-indigo-600">매우 그렇다</span>
                        </button>
                        <button onclick="handleAnswer(1, 'left')" class="flex flex-col items-center gap-1 group">
                            <div class="circle-btn circle-sm border-gray-200 shadow-sm mt-1.5"></div>
                            <span class="text-[10px] text-gray-400 font-bold group-active:text-indigo-600">약간 그렇다</span>
                        </button>
                    </div>
                </div>

                <div class="bg-gray-50/50 rounded-2xl p-4 border border-gray-50">
                    <div class="flex justify-center gap-6 mb-4">
                        <button onclick="handleAnswer(1, 'right')" class="flex flex-col items-center gap-1 group">
                            <div class="circle-btn circle-sm border-gray-200 shadow-sm mb-1.5"></div>
                            <span class="text-[10px] text-gray-400 font-bold group-active:text-indigo-600">약간 그렇다</span>
                        </button>
                        <button onclick="handleAnswer(2, 'right')" class="flex flex-col items-center gap-1 group">
                            <div class="circle-btn circle-lg border-2 border-indigo-200 shadow-sm"></div>
                            <span class="text-[10px] text-gray-400 font-bold group-active:text-indigo-600">매우 그렇다</span>
                        </button>
                    </div>
                    <p id="option-b" class="text-center text-gray-700 font-semibold text-[15px]">선택지 B</p>
                </div>
            </div>

            <div class="flex justify-between items-center mt-8 pt-2 border-t border-gray-50">
                <button id="prev-btn" onclick="goBack()" class="text-gray-400 hover:text-indigo-600 flex items-center gap-1 transition-all text-xs font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                    PREV
                </button>
                <span class="text-[9px] text-gray-300 font-black tracking-widest">MISSION APTITUDE TEST</span>
            </div>
        </div>
    </div>

    <div id="result-screen" class="max-w-md w-full hidden fade-in">
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-indigo-50 text-center">
            <h3 class="text-indigo-500 font-bold mb-8 uppercase tracking-[0.3em] text-[10px]">Your Mission Type</h3>
            <div id="result-code" class="text-7xl font-black text-indigo-900 mb-4 tracking-tighter italic">TYPE</div>
            <h2 id="result-title" class="text-2xl font-bold text-gray-800 mb-8 break-keep">유형 이름</h2>
            <div class="w-10 h-1 bg-indigo-500 mx-auto mb-10 rounded-full"></div>
            <p id="result-desc" class="text-[15px] text-gray-600 leading-[1.8] mb-12 text-left bg-gray-50 p-8 rounded-[2.5rem] border border-white shadow-inner whitespace-pre-wrap"></p>
            <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg active:scale-95">테스트 다시하기</button>
        </div>
    </div>

    <script>
        const rawQuestions = [
            // 지표 1: 사역의 위치 (F vs B)
            { q: "모임에 어색한 정적이 흐를 때,", a: "내가 먼저 아무 말이나 던져 침묵을 깬다.", b: "누군가 말할 때까지 속으로 기다린다.", left: 'F', right: 'B', cat: 'Position' },
            { q: "지인과 함께 식사를 하러갈 때,", a: "먼저 물컵과 수저를 세팅한다.", b: "조심히 상황을 지켜보며 기다린다.", left: 'F', right: 'B', cat: 'Position' },
            { q: "팀 프로젝트를 진행할 때,", a: "마이크를 잡고 스피치 하는 발표자", b: "타이밍 맞춰 PPT를 넘겨주는 오퍼레이터", left: 'F', right: 'B', cat: 'Position' },
            { q: "사역의 자리나 아웃리치에서,", a: "기획을 하는 것이 마음이 편하다.", b: "기획된 대로 움직이는 것이 편하다.", left: 'F', right: 'B', cat: 'Position' },
            { q: "전자기기나 유행에 대해서,", a: "늘 새로운 것을 시도하는 얼리어답터", b: "늘 익숙한 것을 추구하는 안정형", left: 'F', right: 'B', cat: 'Position' },
            
            // 지표 2: 사역의 무대 (W vs L)
            { q: "식당에서 메뉴를 고를 때,", a: "\"안 먹어본 오늘의 특선!\" 낯선 맛에 도전한다.", b: "\"늘 먹던 실패 없는 그 맛!\" 단골 메뉴를 시킨다.", left: 'W', right: 'L', cat: 'Stage' },
            { q: "서점에 가서 베스트셀러 코너를 볼 때,", a: "지구 반대편의 역사나 세계 정세 책에 손이 간다.", b: "내 삶에 바로 적용할 수 있는 실용서에 손이 간다.", left: 'W', right: 'L', cat: 'Stage' },
            { q: "나에게 진짜 '쉼'이 필요할 때,", a: "비행기를 타고 한 번도 안 가본 곳으로 떠난다.", b: "가장 익숙한 내 방 침대에서 OTT를 본다.", left: 'W', right: 'L', cat: 'Stage' },
            { q: "나에게 조금 더 와닿고 눈물이 나는 기도는,", a: "이름 모를 미전도 종족과 선교사님을 향한 기도", b: "나의 가족과 직장 동료, 내 옆자리 지체를 위한 기도", left: 'W', right: 'L', cat: 'Stage' },
            { q: "나의 유튜브 알고리즘에는,", a: "해외여행 브이로그, 걸어서 세계속으로 등", b: "국내 핫플 리뷰, 일상 브이로그, 자기계발 등", left: 'W', right: 'L', cat: 'Stage' },

            // 지표 3: 접근 방식 (R vs T)
            { q: "함께 일하던 팀원이 큰 실수를 했을 때,", a: "\"괜찮아? 많이 당황했지?\" 마음부터 챙긴다.", b: "\"어떻게 수습할지 플랜부터 짜자.\" 해결책부터 챙긴다.", left: 'R', right: 'T', cat: 'Approach' },
            { q: "모임에 지각해서 문을 열고 들어갈 때,", a: "\"다들 정말 미안해! 많이 기다렸지?\"", b: "\"지금 모임 어디까지 진행됐어?\"", left: 'R', right: 'T', cat: 'Approach' },
            { q: "함께 일할 파트너를 고를 때,", a: "성격이 원만하고 소통 방식이 잘 맞는 사람", b: "일 처리 능력이 확실하고 자기 몫을 다하는 사람", left: 'R', right: 'T', cat: 'Approach' },
            { q: "누군가에게 문제가 생겼을 때,", a: "조용히 옆에 앉아 끄덕이며 이야기를 들어준다.", b: "그 사람의 문제를 실질적으로 해결할 방법을 찾는다.", left: 'R', right: 'T', cat: 'Approach' },
            { q: "누군가에게 줄 선물을 준비할 때,", a: "이 선물을 받고 감동할 지인의 표정을 떠올린다.", b: "지인에게 지금 가장 실질적인 도움이 될 물건을 찾는다.", left: 'R', right: 'T', cat: 'Approach' },

            // 지표 4: 상황 대처 (S vs A)
            { q: "공동체 수련회나 아웃리치 짐을 쌀 때,", a: "\"혹시 모르니까\" 며칠 전부터 완벽하게 세팅한다.", b: "\"가서 사면 되지\" 출발 전날 눈에 보이는 대로 챙긴다.", left: 'S', right: 'A', cat: 'Adaptability' },
            { q: "가기로 한 식당이 하필 오늘 휴무일일 때,", a: "'왜 미리 검색을 안 했을까' 극심한 스트레스를 받는다.", b: "'오, 다른 맛집을 찾을 기회네!' 오히려 설렌다.", left: 'S', right: 'A', cat: 'Adaptability' },
            { q: "어떤 목적지를 찾아 갈 때,", a: "도착 예정 시간과 최적의 경로를 철저히 따른다.", b: "가끔은 내비게이션을 끄고 낯선 골목을 걸어본다.", left: 'S', right: 'A', cat: 'Adaptability' },
            { q: "내 스마트폰 캘린더의 상태는,", a: "시간 단위로 할 일과 미팅이 빼곡하게 적혀 있다.", b: "굵직한 약속만 적혀 있고 여백이 훨씬 많다.", left: 'S', right: 'A', cat: 'Adaptability' },
            { q: "마감일이 정해진 사역이나 업무를 할 때,", a: "미리미리 끝내놔야 마음 편히 발 뻗고 잔다.", b: "마감 직전 폭발하는 아드레날린의 효율을 믿는다.", left: 'S', right: 'A', cat: 'Adaptability' }
        ];

        const results = {
            "FWRS": ["준비된 글로벌 프론티어", "선교지 최전방에서 현지인과 깊게 교제하며, 철저하게 계획된 일정대로 전도하는 빈틈없는 개척자."],
            "FWRA": ["성령충만 글로벌 인싸", "낯선 타문화권에서도 바디랭귀지로 현지인과 5분 만에 베프가 되는 자유로운 영혼의 소유자."],
            "FWTS": ["열방의 홀리 버스커", "등 뒤에 기타 하나 둘러메고 당당하게 앞장서며, 완벽하게 기획된 공연이나 사역으로 선교지 무대를 장악하는 달란트 부자."],
            "FWTA": ["위기탈출 타문화 특공대", "선교지에서 음향이 꺼지거나 돌발 상황이 생겨도, 특유의 순발력과 끼로 분위기를 확 띄우는 무대 위 해결사."],
            "FLRS": ["일상의 전략적 멘토", "학교나 직장에서 믿지 않는 영혼을 마음에 품고, 치밀하게 타이밍을 재어 밥을 사주며 복음을 전하는 관계 전도의 달인."],
            "FLRA": ["동네방네 빛과 소금", "우리 교회 공동체나 일상 속에서 누구와도 스스럼없이 어울리며, 삶의 자연스러운 모습으로 그리스도의 향기를 뿜어내는 인싸."],
            "FLTS": ["공동체 하드캐리 리더", "새해 성경통독 프로그램이나 청년부 수련회 등 중요한 사역을 철저하게 기획하고 맨 앞에서 끌고 가는 열정 리더."],
            "FLTA": ["순발력 만렙 사역자", "교회에서 갑작스럽게 간증이나 특송, 레크리에이션 진행을 부탁받아도 당황하지 않고 은혜롭게 해내는 만능 엔터테이너."],
            "BWRS": ["선교지 마더 테레사", "눈에 띄지 않는 곳에서 현지인들의 필요와 아픔을 꼼꼼하게 살피고 품어주는 따뜻한 심장."],
            "BWRA": ["국경 초월 힐러", "프로그램 중심의 사역보다는, 현지 아이들을 그저 묵묵히 안아주고 상황에 맞춰 돌봐주는 데서 큰 기쁨을 느끼는 사람."],
            "BWTS": ["파워 스케쥴 선교 네비게이터", "항공권, 재정 관리, 사역 타임테이블 등 선교의 뼈대를 오차 없이 완벽하게 세워 팀을 이끄는 보이지 않는 브레인."],
            "BWTA": ["선교지 만능 맥가이버", "무더운 날 짐을 나르거나 식사를 챙기는 등, 선교 현장에서 발생하는 온갖 돌발적인 궂은일을 말없이 척척 해결하는 기둥."],
            "BLRS": ["비밀 중보기도 요원", "기도 노트에 지체들의 이름을 빼곡히 적어두고, 치밀하고 구체적으로 영적 전쟁의 최후방을 지키는 기도의 용사."],
            "BLRA": ["공동체 인간 핫팩", "공동체 모임에서 어색해하거나 소외된 새가족 곁에 유연하게 다가가, 조용히 말을 건네며 마음을 녹여주는 따뜻한 난로."],
            "BLTS": ["디테일 깎는 장인", "청년부 행사 때 PPT, 영상, 회계 등 가장 손이 많이 가고 티 안 나는 사역을 완벽하게 준비하는 보이지 않는 손."],
            "BLTA": ["교회의 숨은 천사", "일손이 부족하거나 펑크 난 자리가 생기면 제일 먼저 달려와 그 자리를 기꺼이 메워주는, 묵묵하지만 가장 든든한 동역자."]
        };

        let questions = [];
        let currentIndex = 0;
        let scores = { F: 0, B: 0, W: 0, L: 0, R: 0, T: 0, S: 0, A: 0 };
        let history = [];

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function startTest() {
            questions = shuffle([...rawQuestions]);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            const container = document.getElementById('question-container');
            
            container.classList.remove('question-fade');
            void container.offsetWidth;
            container.classList.add('question-fade');

            document.getElementById('scenario-text').innerText = q.q;
            document.getElementById('option-a').innerText = q.a;
            document.getElementById('option-b').innerText = q.b;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / 20`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / 20) * 100}%`;
            document.getElementById('indicator-name').innerText = q.cat;
            document.getElementById('prev-btn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            window.scrollTo(0,0);
        }

        function handleAnswer(pts, side) {
            if (document.activeElement) document.activeElement.blur();
            const q = questions[currentIndex];
            const type = side === 'left' ? q.left : q.right;
            
            scores[type] += pts;
            history.push({ type, pts });

            if (currentIndex < 19) {
                currentIndex++;
                setTimeout(showQuestion, 200);
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentIndex > 0) {
                const last = history.pop();
                scores[last.type] -= last.pts;
                currentIndex--;
                showQuestion();
            }
        }

        function showResult() {
            const mbti = (scores.F >= scores.B ? "F" : "B") + 
                         (scores.W >= scores.L ? "W" : "L") + 
                         (scores.R >= scores.T ? "R" : "T") + 
                         (scores.S >= scores.A ? "S" : "A");

            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-code').innerText = mbti;
            document.getElementById('result-title').innerText = results[mbti][0];
            document.getElementById('result-desc').innerText = results[mbti][1];
            window.scrollTo(0,0);
        }
    </script>
